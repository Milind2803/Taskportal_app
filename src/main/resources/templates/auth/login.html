<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Login – Task Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body{background:#e8eaf6;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .card{border:none;border-radius:14px;box-shadow:0 6px 30px rgba(0,0,0,.12);}
        .btn-primary{background:#1a237e;border-color:#1a237e;}
        .btn-primary:hover{background:#283593;border-color:#283593;}
    </style>
</head>
<body>
<div class="card p-4" style="width:380px">
    <div class="text-center mb-3">
        <div style="font-size:2rem">📋</div>
        <h5 style="color:#1a237e;font-weight:700">Task Portal</h5>
        <small class="text-muted">by Milind Nagne</small>
    </div>
    <div th:if="${param.logout}" class="alert alert-info py-2 small">Logged out successfully.</div>
    <div th:if="${param.error}" class="alert alert-danger py-2 small">Invalid username or password.</div>
    <div th:if="${success}" class="alert alert-success py-2 small" th:text="${success}"></div>
    <form th:action="@{/auth/login}" method="post">
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="text-center mt-3 small mb-0">No account? <a th:href="@{/auth/register}">Register here</a></p>
</div>
</body></html>
