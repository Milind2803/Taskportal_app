<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Register – Task Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body{background:#e8eaf6;display:flex;align-items:center;justify-content:center;min-height:100vh;}
        .card{border:none;border-radius:14px;box-shadow:0 6px 30px rgba(0,0,0,.12);}
        .btn-primary{background:#1a237e;border-color:#1a237e;}
    </style>
</head>
<body>
<div class="card p-4" style="width:400px">
    <div class="text-center mb-3">
        <div style="font-size:2rem">📋</div>
        <h5 style="color:#1a237e;font-weight:700">Create Account</h5>
    </div>
    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>
    <form th:action="@{/auth/register}" method="post" th:object="${user}">
        <div class="mb-3">
            <label class="form-label fw-semibold">Username</label>
            <input type="text" th:field="*{username}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" th:field="*{email}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" th:field="*{password}" class="form-control" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>
    <p class="text-center mt-3 small mb-0">Have an account? <a th:href="@{/auth/login}">Login</a></p>
</div>
</body></html>
