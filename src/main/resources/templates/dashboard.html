<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"><title>Dashboard – Task Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body{background:#f0f2f5;font-family:'Segoe UI',sans-serif;}
        .sidebar{background:linear-gradient(180deg,#1a237e,#283593);min-height:100vh;width:230px;flex-shrink:0;padding-top:10px;}
        .sidebar .brand{color:#fff;font-weight:700;font-size:1.05rem;padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.15);display:flex;align-items:center;gap:8px;}
        .sidebar a{color:#c5cae9;text-decoration:none;display:flex;align-items:center;gap:10px;padding:11px 20px;font-size:.9rem;transition:.2s;}
        .sidebar a:hover,.sidebar a.active{background:rgba(255,255,255,.12);color:#fff;}
        .topbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
        .stat-card{border:none;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.07);}
        .stat-card .icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
        .badge-TODO{background:#6c757d!important;}
        .badge-IN_PROGRESS{background:#0d6efd!important;}
        .badge-REVIEW{background:#fd7e14!important;}
        .badge-DONE{background:#198754!important;}
        .badge-HIGH{background:#dc3545!important;}
        .badge-MEDIUM{background:#fd7e14!important;}
        .badge-LOW{background:#198754!important;}
        .table>tbody>tr:hover{background:#f8f9ff;}
    </style>
</head>
<body>
<div class="d-flex">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="brand"><i class="bi bi-kanban-fill"></i> Task Portal</div>
        <div style="padding:20px 20px 8px;color:#9fa8da;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em">Navigation</div>
        <a th:href="@{/dashboard}" class="active"><i class="bi bi-speedometer2"></i>Dashboard</a>
        <a th:href="@{/tasks/new}"><i class="bi bi-plus-circle"></i>New Task</a>
        <div style="position:absolute;bottom:0;left:0;right:0;padding:16px 20px;border-top:1px solid rgba(255,255,255,.1)">
            <div style="color:#c5cae9;font-size:.85rem" th:text="${user.username}"></div>
            <div style="color:#7986cb;font-size:.75rem" th:text="${user.role}"></div>
            <a th:href="@{/auth/logout}" style="color:#ef9a9a;font-size:.8rem;margin-top:6px;display:block;">
                <i class="bi bi-box-arrow-left"></i> Logout
            </a>
        </div>
    </div>

    <!-- Main content -->
    <div class="flex-grow-1">
        <div class="topbar">
            <h6 class="mb-0 fw-bold" style="color:#1a237e"><i class="bi bi-speedometer2 me-2"></i>Dashboard</h6>
            <a th:href="@{/tasks/new}" class="btn btn-sm" style="background:#1a237e;color:#fff;border-radius:8px">
                <i class="bi bi-plus-lg me-1"></i>New Task
            </a>
        </div>

        <div class="p-4">
            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" th:text="${success}">
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Stats -->
            <div class="row g-3 mb-4">
                <div class="col-6 col-md-4 col-lg-2-4" th:each="entry : ${stats}" style="min-width:150px">
                    <div class="card stat-card p-3">
                        <div class="d-flex align-items-center gap-3">
                            <div class="icon" style="background:#e8eaf6;color:#1a237e">
                                <i class="bi bi-list-task"></i>
                            </div>
                            <div>
                                <div class="fw-bold fs-5" style="color:#1a237e" th:text="${entry.value}">0</div>
                                <div class="text-muted" style="font-size:.75rem" th:text="${entry.key}">label</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tasks table -->
            <div class="card border-0 shadow-sm" style="border-radius:12px;overflow:hidden">
                <div class="card-header bg-white py-3 px-4 border-bottom">
                    <strong style="color:#1a237e"><i class="bi bi-table me-2"></i>All Tasks</strong>
                </div>
                <div class="card-body p-0">
                    <table class="table mb-0 align-middle">
                        <thead style="background:#f5f5f5">
                            <tr>
                                <th class="px-4">#</th>
                                <th>Title</th>
                                <th>Priority</th>
                                <th>Status</th>
                                <th>Assigned To</th>
                                <th>Deadline</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:if="${#lists.isEmpty(tasks)}">
                                <td colspan="7" class="text-center text-muted py-5">
                                    <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                    No tasks yet. <a th:href="@{/tasks/new}">Create your first task!</a>
                                </td>
                            </tr>
                            <tr th:each="task : ${tasks}">
                                <td class="px-4 text-muted small" th:text="${task.id}"></td>
                                <td class="fw-semibold" th:text="${task.title}"></td>
                                <td>
                                    <span class="badge rounded-pill"
                                          th:classappend="'badge-' + ${task.priority}"
                                          th:text="${task.priority}"></span>
                                </td>
                                <td>
                                    <span class="badge rounded-pill"
                                          th:classappend="'badge-' + ${task.status}"
                                          th:text="${task.status.name().replace('_',' ')}"></span>
                                </td>
                                <td th:text="${task.assignedTo?.username ?: '—'}"></td>
                                <td th:text="${task.deadline ?: '—'}" class="small text-muted"></td>
                                <td>
                                    <a th:href="@{/tasks/edit/{id}(id=${task.id})}"
                                       class="btn btn-sm btn-outline-primary py-0 me-1">Edit</a>
                                    <a th:href="@{/tasks/delete/{id}(id=${task.id})}"
                                       class="btn btn-sm btn-outline-danger py-0"
                                       onclick="return confirm('Delete this task?')">Del</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
