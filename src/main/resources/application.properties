# ── Local Dev (H2) ────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.application.name=taskportal
server.port=8080
spring.thymeleaf.cache=false

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.name=Task Management Portal
info.app.developer=Milind Nagne
info.app.version=1.0.0

# Datadog (disabled locally - set DD_API_KEY env var in production)
management.datadog.metrics.export.enabled=false
management.datadog.metrics.export.api-key=${DD_API_KEY:none}
management.datadog.metrics.export.application-key=${DD_APP_KEY:none}
management.datadog.metrics.export.step=30s
