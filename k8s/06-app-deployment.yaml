apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskportal-app
  namespace: taskportal
  labels:
    app: taskportal
    version: "1.0.0"
    tags.datadoghq.com/env: production
    tags.datadoghq.com/service: taskportal
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskportal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: taskportal
        tags.datadoghq.com/env: production
        tags.datadoghq.com/service: taskportal
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/taskportal.logs: '[{"source":"java","service":"taskportal"}]'
    spec:
      containers:
        - name: taskportal
          image: yourdockerhubuser/taskportal:latest   # update with your image
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 40
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: taskportal-service
  namespace: taskportal
spec:
  type: NodePort
  selector:
    app: taskportal
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
